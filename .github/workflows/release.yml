name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Build standalone exe (PyInstaller)
        run: python -m PyInstaller backend/codec_monitor.spec --noconfirm --distpath dist --workpath build

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc installer.iss

      - name: Extract changelog section for this release
        id: changelog
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $content = Get-Content CHANGELOG.md -Raw
          $pattern = "(?ms)^## \[$([regex]::Escape($version))\].*?(?=^## \[|\z)"
          $m = [regex]::Match($content, $pattern)
          $notes = if ($m.Success) { $m.Value.Trim() } else { "See CHANGELOG.md for details." }
          $delimiter = "EOF_$([guid]::NewGuid().ToString('N'))"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "notes<<$delimiter"
          Add-Content -Path $env:GITHUB_OUTPUT -Value $notes
          Add-Content -Path $env:GITHUB_OUTPUT -Value $delimiter

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Codec Monitor.exe
            dist/CodecMonitor-Setup.exe
          body: ${{ steps.changelog.outputs.notes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
